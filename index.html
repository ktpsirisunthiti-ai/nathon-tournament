<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบแข่งขันแบดมินตัน หน้าทอน สมุย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --court-green:#0F4C3A;
  --court-green-dark:#0A362A;
  --sea-teal:#0E7C86;
  --sea-teal-light:#12A0AC;
  --sand:#F3E9D2;
  --shuttle-white:#FDFBF6;
  --sunset:#E8623A;
  --sunset-dark:#C24B29;
  --ink:#152521;
  --ink-soft:#4A5C56;
  --gold:#D9A441;
  --line:#DCD2B8;
  --danger:#C0392B;
  --radius:12px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Noto Sans Thai','Kanit',sans-serif;
  background:var(--sand);
  color:var(--ink);
  min-height:100vh;
}
#app{max-width:1200px;margin:0 auto;padding-bottom:60px;}
.header{
  background:linear-gradient(180deg,var(--court-green) 0%,var(--court-green-dark) 100%);
  color:var(--shuttle-white);
  padding:18px 20px 14px;
  border-bottom:4px solid var(--gold);
}
.header .eyebrow{
  font-family:'Kanit',sans-serif;
  font-size:12px;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold); font-weight:600; margin:0 0 2px;
}
.header h1{
  font-family:'Kanit',sans-serif;
  font-size:clamp(20px,4vw,30px);
  font-weight:700;margin:0;
}
.header .sub{font-size:13px;color:#CFE3DC;margin-top:4px;}
.nav{
  display:flex;gap:0;background:var(--court-green-dark);
  overflow-x:auto;
}
.nav button{
  font-family:'Kanit',sans-serif;
  flex:1;min-width:110px;
  background:transparent;border:none;color:#BFD8CE;
  padding:12px 8px;font-size:14px;font-weight:600;cursor:pointer;
  border-bottom:3px solid transparent;
  white-space:nowrap;
}
.nav button.active{color:var(--shuttle-white);border-bottom:3px solid var(--sunset);background:rgba(255,255,255,0.06);}
.nav button:hover{color:var(--shuttle-white);}
.cat-bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px;background:#EFE6CC;border-bottom:1px solid var(--line);}
.cat-pill{font-family:'Kanit',sans-serif;background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);}
.cat-pill.active{background:var(--court-green);color:#fff;border-color:var(--court-green);}
.cat-pill.add{border-style:dashed;color:var(--sea-teal);border-color:var(--sea-teal);background:transparent;}
.cat-pill:hover{border-color:var(--sea-teal);}
.content{padding:18px 16px;}
.card{
  background:var(--shuttle-white);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;margin-bottom:16px;
}
.card h2{
  font-family:'Kanit',sans-serif;
  font-size:19px;margin:0 0 12px;color:var(--court-green);
  display:flex;align-items:center;gap:8px;
}
.card h3{font-family:'Kanit',sans-serif;font-size:16px;margin:14px 0 8px;color:var(--sea-teal);}
label{font-size:13px;color:var(--ink-soft);display:block;margin-bottom:4px;}
input[type=text],input[type=number],select{
  font-family:inherit;font-size:15px;padding:9px 10px;
  border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);
  width:100%;
}
input:focus,select:focus{outline:2px solid var(--sea-teal-light);border-color:var(--sea-teal);}
button.btn{
  font-family:'Kanit',sans-serif;
  background:var(--sea-teal);color:#fff;border:none;border-radius:8px;
  padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;
}
button.btn:hover{background:var(--sea-teal-light);}
button.btn.primary{background:var(--sunset);}
button.btn.primary:hover{background:var(--sunset-dark);}
button.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink-soft);}
button.btn.ghost:hover{border-color:var(--sea-teal);color:var(--sea-teal);}
button.btn.danger{background:transparent;border:1px solid var(--danger);color:var(--danger);}
button.btn.danger:hover{background:var(--danger);color:#fff;}
button.icon-btn{background:transparent;border:1px solid var(--line);border-radius:6px;width:30px;height:30px;cursor:pointer;color:var(--ink-soft);font-size:15px;line-height:1;}
button.icon-btn:hover{border-color:var(--danger);color:var(--danger);}
.row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.row > div{flex:1;min-width:140px;}
.group-block{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px;background:#FCFAF3;}
.group-block .ghead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.group-block .gname{font-family:'Kanit',sans-serif;font-weight:700;color:var(--court-green);font-size:15px;}
.team-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
.team-row input{flex:1;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{padding:7px 8px;text-align:center;border-bottom:1px solid var(--line);}
th{font-family:'Kanit',sans-serif;color:var(--ink-soft);font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:0.5px;}
td.team-name,th.team-name{text-align:left;font-weight:500;}
tr.rank1{background:#FBF1DA;}
tr.rank2{background:#F5FAF6;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;font-family:'Kanit',sans-serif;}
.badge.done{background:#E1F5EE;color:#085041;}
.badge.ongoing{background:#FAEEDA;color:#854F0B;}
.badge.pending{background:#F1EFE8;color:#5F5E5A;}
.badge.tie{background:#FCEBEB;color:#791F1F;}
.match-row{
  display:grid;
  grid-template-columns: minmax(140px,1.1fr) minmax(92px,108px) minmax(72px,85px) minmax(95px,115px) minmax(75px,auto) minmax(76px,auto) minmax(72px,auto) minmax(72px,auto);
  align-items:center;gap:6px 8px;padding:9px 6px;border-bottom:1px solid var(--line);font-size:14px;
}
.match-row:last-child{border-bottom:none;}
.match-teams{font-weight:500;}
.match-teams .vs{color:var(--ink-soft);font-weight:400;margin:0 6px;}
.match-score{font-family:'Kanit',sans-serif;font-weight:700;color:var(--court-green);white-space:nowrap;}
.match-row select, .match-row input[type=time], .bracket-match select, .bracket-match input[type=time]{
  font-size:12.5px;padding:6px 4px;width:100%;
}
.schedule-readonly{font-size:12px;color:var(--sea-teal);white-space:nowrap;}
.schedule-row{
  display:grid;
  grid-template-columns: minmax(150px,1.2fr) minmax(92px,108px) minmax(72px,85px) minmax(95px,115px) minmax(76px,auto);
  align-items:center;gap:6px 8px;padding:9px 6px;border-bottom:1px solid var(--line);font-size:14px;
}
.schedule-row:last-child{border-bottom:none;}
.schedule-row select, .schedule-row input[type=time]{font-size:12.5px;padding:6px 4px;width:100%;}
@media (max-width:760px){
  .schedule-row{grid-template-columns: 1fr; row-gap:6px; padding:12px 6px;}
}
@media (max-width:760px){
  .match-row{grid-template-columns: 1fr; row-gap:6px; padding:12px 6px;}
}
.setbox-list{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0;}
.setbox{border:1px solid var(--line);border-radius:8px;padding:10px;background:#FCFAF3;min-width:160px;}
.setbox .setlabel{font-family:'Kanit',sans-serif;font-size:13px;color:var(--ink-soft);margin-bottom:6px;}
.setbox .setinputs{display:flex;align-items:center;gap:6px;}
.setbox input{width:64px;text-align:center;font-size:18px;font-weight:700;}
.note{font-size:12.5px;color:var(--ink-soft);background:#FCF6E8;border:1px dashed var(--gold);padding:8px 10px;border-radius:8px;margin-bottom:12px;}
.warn{font-size:13px;color:var(--danger);font-weight:600;}
.ok{font-size:13px;color:#085041;font-weight:600;}
.empty{color:var(--ink-soft);font-size:14px;padding:14px 0;text-align:center;}
.bracket-round{margin-bottom:20px;}
.bracket-round h3{margin-top:0;}
.bracket-match{
  border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin-bottom:8px;background:#FCFAF3;
  display:grid;
  grid-template-columns: minmax(90px,1fr) minmax(104px,116px) minmax(90px,1fr) minmax(76px,auto) minmax(92px,108px) minmax(72px,85px) minmax(95px,115px) minmax(110px,auto);
  align-items:center;gap:6px 8px;
}
.bracket-match .side{font-weight:500;}
.bracket-match .side:first-child{text-align:right;}
.bracket-match .side.winner{color:var(--court-green);font-weight:700;}
.bracket-match .score{font-family:'Kanit',sans-serif;font-weight:700;white-space:nowrap;text-align:center;color:var(--court-green);}
.bracket-actions{display:flex;gap:8px;flex-wrap:wrap;}
@media (max-width:760px){
  .bracket-match{grid-template-columns: 1fr 1fr; row-gap:6px;}
}
.enter-link{font-size:12.5px;color:var(--sea-teal);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit;}
.cancel-link{font-size:12.5px;color:var(--danger);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit;}
.bigscreen{
  background:var(--court-green-dark);color:var(--shuttle-white);
  border-radius:14px;padding:24px 28px;min-height:60vh;
  display:flex;flex-direction:column;
}
.bigscreen .bs-title{font-family:'Kanit',sans-serif;font-size:clamp(20px,3vw,30px);font-weight:700;color:var(--gold);margin-bottom:4px;}
.bigscreen .bs-sub{font-size:15px;color:#CFE3DC;margin-bottom:18px;}
.bigscreen table{width:100%;font-size:clamp(15px,2vw,22px);}
.bigscreen th{color:#9FD8C4;border-bottom:2px solid #1D6B54;}
.bigscreen td{border-bottom:1px solid #1D6B54;color:var(--shuttle-white);}
.bigscreen tr.rank1{background:rgba(217,164,65,0.18);}
.bigscreen tr.rank2{background:rgba(255,255,255,0.05);}
.bigscreen .match-row{border-bottom:1px solid #1D6B54;font-size:clamp(14px,1.8vw,19px);color:var(--shuttle-white);}
.bigscreen .match-score{color:var(--gold);font-size:clamp(16px,2.2vw,24px);}
.bs-controls{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:16px;flex-wrap:wrap;}
.bs-dots{display:flex;gap:6px;}
.bs-dots span{width:8px;height:8px;border-radius:50%;background:#2A5A48;}
.bs-dots span.on{background:var(--gold);}
.helper{font-size:12px;color:var(--ink-soft);margin-top:-6px;margin-bottom:10px;}
@media (max-width:640px){
  .content{padding:12px 10px;}
  .card{padding:12px 12px;}
  th,td{font-size:12.5px;padding:5px 4px;}
}
</style>

<body>
<div id="app"><div class="empty">กำลังโหลดข้อมูลการแข่งขัน...</div></div>
<script>
const FIREBASE_DB_URL = 'https://nathon-tournament-default-rtdb.asia-southeast1.firebasedatabase.app';
const STATE_PATH = 'tournament_state';
/* Find this in Firebase Console > Project settings > General > Web API Key */
const FIREBASE_API_KEY = 'AIzaSyC38vKjo8tOQgUlxZqlCLaBBF87IGW3_Pw';
const AUTH_LS_KEY = 'badminton_staff_refresh_v1';
const COURTS = ['คอร์ต 1', 'คอร์ต 2', 'คอร์ต 3'];

let appState = null;
let ui = { tab:'categories', scoreEntryMatchId:null, bigScreenIndex:0, bigScreenPlaying:true, bigScreenFilter:'all', showLoginForm:false };
let auth = { idToken:null, refreshToken:null, expiresAt:0, email:null };

function isLoggedIn(){ return !!auth.email; }
function requireLoginNotice(){
  return `<div class="card"><div class="empty">แท็บนี้สำหรับทีมงานเท่านั้น กรุณาเข้าสู่ระบบที่มุมบนของหน้าก่อนใช้งาน</div></div>`;
}

async function login(email, password){
  try{
    const res = await fetchWithTimeout(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FIREBASE_API_KEY}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password, returnSecureToken:true})
    }, 10000);
    const data = await res.json();
    if(!res.ok){
      alert('เข้าสู่ระบบไม่สำเร็จ: ' + ((data.error && data.error.message) || 'กรุณาตรวจสอบอีเมล/รหัสผ่าน'));
      return;
    }
    auth.idToken = data.idToken;
    auth.refreshToken = data.refreshToken;
    auth.expiresAt = Date.now() + (parseInt(data.expiresIn)*1000);
    auth.email = data.email;
    try{ localStorage.setItem(AUTH_LS_KEY, JSON.stringify({refreshToken:data.refreshToken, email:data.email})); }catch(e){}
    ui.showLoginForm = false;
    render();
  }catch(e){
    alert('เข้าสู่ระบบไม่สำเร็จ: เครือข่ายมีปัญหา');
  }
}
function logout(){
  auth = { idToken:null, refreshToken:null, expiresAt:0, email:null };
  try{ localStorage.removeItem(AUTH_LS_KEY); }catch(e){}
  render();
}
async function refreshIdToken(){
  if(!auth.refreshToken) return false;
  try{
    const res = await fetchWithTimeout(`https://securetoken.googleapis.com/v1/token?key=${FIREBASE_API_KEY}`, {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: `grant_type=refresh_token&refresh_token=${encodeURIComponent(auth.refreshToken)}`
    }, 8000);
    const data = await res.json();
    if(!res.ok) return false;
    auth.idToken = data.id_token;
    auth.refreshToken = data.refresh_token;
    auth.expiresAt = Date.now() + (parseInt(data.expires_in)*1000);
    try{ localStorage.setItem(AUTH_LS_KEY, JSON.stringify({refreshToken:data.refresh_token, email:auth.email})); }catch(e){}
    return true;
  }catch(e){ return false; }
}
async function ensureFreshToken(){
  if(!auth.refreshToken) return false;
  if(auth.idToken && Date.now() < auth.expiresAt - 5*60*1000) return true;
  return await refreshIdToken();
}
async function restoreSession(){
  try{
    const saved = localStorage.getItem(AUTH_LS_KEY);
    if(!saved) return;
    const parsed = JSON.parse(saved);
    auth.refreshToken = parsed.refreshToken;
    auth.email = parsed.email;
    const ok = await refreshIdToken();
    if(!ok){ auth = { idToken:null, refreshToken:null, expiresAt:0, email:null }; try{ localStorage.removeItem(AUTH_LS_KEY); }catch(e){} }
  }catch(e){ /* ignore */ }
}
function handleLoginSubmit(){
  const emailEl = document.getElementById('login-email');
  const passEl = document.getElementById('login-password');
  const email = emailEl ? emailEl.value.trim() : '';
  const password = passEl ? passEl.value : '';
  if(!email || !password){ alert('กรุณากรอกอีเมลและรหัสผ่าน'); return; }
  login(email, password);
}

function esc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ---------- state model ---------- */
function makeDefaultCategory(id, name){
  const groups = []; const teamNames = {};
  ['A','B','C','D'].forEach(gid=>{
    const teamIds = [];
    for(let i=1;i<=4;i++){
      const tid = gid+i;
      teamIds.push(tid);
      teamNames[tid] = `ทีม ${gid}${i}`;
    }
    groups.push({id:gid, teamIds});
  });
  return {
    id, name,
    config:{ advancePerGroup:2, groupSets:2 },
    groups, teamNames,
    matches:[], bracket:null, bracketSetup:null
  };
}

function defaultState(){
  return {
    eventName:'Nathon Badminton Challenge#2 2026',
    categories: [],
    activeCategoryId: null,
    catSeq: 0,
    updatedAt: Date.now()
  };
}

async function fetchWithTimeout(url, opts, ms){
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), ms || 8000);
  try{
    return await fetch(url, Object.assign({}, opts, {signal: controller.signal}));
  } finally {
    clearTimeout(timer);
  }
}
/* ---------- Firebase RTDB rehydration ----------
   Firebase silently drops any field that is null or an empty array/object,
   and turns a sparse array (nulls in the middle, e.g. bracket "bye" slots)
   into a plain object instead of an array. normalizeState() repairs all of
   that after every load/poll so the rest of the app can rely on a stable shape. */
function toArray(value, expectedLength){
  if(Array.isArray(value)) return value;
  if(value && typeof value === 'object'){
    const keys = Object.keys(value).map(k=>parseInt(k,10)).filter(n=>!isNaN(n));
    const maxIdx = keys.length ? Math.max(...keys) : -1;
    const len = (expectedLength!=null) ? Math.max(expectedLength, maxIdx+1) : maxIdx+1;
    const arr = [];
    for(let i=0;i<len;i++) arr.push(value[i] !== undefined ? value[i] : null);
    return arr;
  }
  return [];
}
function normalizeMatch(m){
  if(!m) return m;
  m.sets = toArray(m.sets).map(s => ({
    a: (s && s.a !== undefined) ? s.a : null,
    b: (s && s.b !== undefined) ? s.b : null
  }));
  if(m.team1Id === undefined) m.team1Id = null;
  if(m.team2Id === undefined) m.team2Id = null;
  if(m.winnerId === undefined) m.winnerId = null;
  if(m.doneAt === undefined) m.doneAt = null;
  if(m.nextMatchId === undefined) m.nextMatchId = null;
  if(m.nextSlotSide === undefined) m.nextSlotSide = null;
  if(m.updatedAt === undefined) m.updatedAt = m.doneAt || 0;
  if(m.scheduledAt === undefined) m.scheduledAt = null;
  if(m.court === undefined) m.court = null;
  return m;
}
function normalizeCategory(c){
  c.config = (c.config && typeof c.config === 'object') ? c.config : {};
  if(c.config.advancePerGroup == null) c.config.advancePerGroup = 2;
  if(c.config.groupSets == null) c.config.groupSets = 2;
  c.groups = toArray(c.groups).map(g=>{
    g.teamIds = toArray(g.teamIds);
    return g;
  });
  c.teamNames = (c.teamNames && typeof c.teamNames === 'object') ? c.teamNames : {};
  c.matches = toArray(c.matches).map(normalizeMatch);
  if(c.bracket && typeof c.bracket === 'object'){
    c.bracket.roundNames = toArray(c.bracket.roundNames);
  } else {
    c.bracket = null;
  }
  if(c.bracketSetup && typeof c.bracketSetup === 'object'){
    c.bracketSetup.slots = toArray(c.bracketSetup.slots, c.bracketSetup.size);
  } else {
    c.bracketSetup = null;
  }
  return c;
}
function normalizeState(state){
  if(!state || typeof state !== 'object') return null;
  state.eventName = state.eventName || 'แบดมินตัน หน้าทอน เกาะสมุย';
  state.categories = toArray(state.categories).map(normalizeCategory);
  if(state.activeCategoryId === undefined) state.activeCategoryId = null;
  if(state.catSeq === undefined) state.catSeq = state.categories.length;
  if(state.updatedAt === undefined) state.updatedAt = Date.now();
  return state;
}

async function loadState(){
  try{
    const res = await fetchWithTimeout(`${FIREBASE_DB_URL}/${STATE_PATH}.json`, {}, 8000);
    if(!res.ok) return null;
    const data = await res.json();
    return data ? normalizeState(data) : null;
  }catch(e){ console.error('load failed', e); return null; }
}
/* ---------- merge-before-write (protects concurrent staff edits) ----------
   Multiple staff can be entering scores for different matches at the same
   moment. Since writes replace the whole JSON blob, we fetch the freshest
   remote copy right before saving and merge our local change into it at the
   match level (newest updatedAt per match id wins) instead of blindly
   clobbering whatever anyone else just saved. */
function mergeMatches(remoteMatches, localMatches){
  const byId = {};
  (remoteMatches||[]).forEach(m=>{ byId[m.id] = m; });
  (localMatches||[]).forEach(lm=>{
    const rm = byId[lm.id];
    if(!rm){ byId[lm.id] = lm; return; }
    const rmTime = rm.updatedAt || rm.doneAt || 0;
    const lmTime = lm.updatedAt || lm.doneAt || 0;
    byId[lm.id] = (lmTime >= rmTime) ? lm : rm;
  });
  return Object.values(byId);
}
function reconcileKnockoutSlots(cat){
  /* Which teams occupy a knockout slot is not independent data — it is a pure
     function of the feeding matches' results. Storing it and merging it
     field-by-field lets two devices disagree (e.g. one clears a result while
     the other edits the same next-round match, and the stale team comes back).
     So after every merge we simply re-derive every slot after round 1.
     Round 1 is left alone: it comes from the admin-chosen bracket setup. */
  if(!cat.bracket || !cat.bracket.generated) return;
  const roundNames = toArray(cat.bracket.roundNames);
  if(roundNames.length < 2) return;
  const laterRounds = new Set(roundNames.slice(1));
  cat.matches.forEach(m=>{
    if(m.stage==='knockout' && laterRounds.has(m.round)){ m.team1Id = null; m.team2Id = null; }
  });
  roundNames.forEach(rn=>{
    cat.matches.filter(m=>m.stage==='knockout' && m.round===rn && m.nextMatchId).forEach(m=>{
      const next = cat.matches.find(x=>x.id===m.nextMatchId);
      if(!next) return;
      const advancing = (m.status==='done' && m.winnerId) ? m.winnerId : null;
      if(m.nextSlotSide==='team1') next.team1Id = advancing; else next.team2Id = advancing;
    });
  });
  // A match that lost one of its teams can no longer hold a valid result.
  cat.matches.forEach(m=>{
    if(m.stage!=='knockout' || !laterRounds.has(m.round)) return;
    if(m.status==='done' && (!m.team1Id || !m.team2Id)){
      m.status='pending'; m.winnerId=null; m.sets=[]; m.doneAt=null;
    }
  });
}
function mergeCategory(remoteCat, localCat){
  const merged = JSON.parse(JSON.stringify(remoteCat));
  merged.name = localCat.name;
  merged.config = localCat.config;
  merged.groups = localCat.groups;
  merged.teamNames = localCat.teamNames;
  merged.bracket = localCat.bracket;
  merged.bracketSetup = localCat.bracketSetup;
  merged.matches = mergeMatches(remoteCat.matches, localCat.matches);
  reconcileKnockoutSlots(merged);
  return merged;
}
function mergeStates(remote, local){
  const merged = JSON.parse(JSON.stringify(remote));
  merged.eventName = local.eventName;
  merged.activeCategoryId = local.activeCategoryId;
  merged.catSeq = Math.max(remote.catSeq||0, local.catSeq||0);
  const remoteById = {};
  merged.categories.forEach(c=>{ remoteById[c.id]=c; });
  const mergedCats = [];
  const seen = new Set();
  local.categories.forEach(localCat=>{
    const remoteCat = remoteById[localCat.id];
    mergedCats.push(remoteCat ? mergeCategory(remoteCat, localCat) : localCat);
    seen.add(localCat.id);
  });
  // keep categories that exist remotely but not locally (created by someone else meanwhile)
  merged.categories.forEach(c=>{ if(!seen.has(c.id)) mergedCats.push(c); });
  merged.categories = mergedCats;
  return merged;
}

async function saveStateDirect(){
  /* Plain overwrite — used for structural/admin actions (categories, setup,
     bracket setup, fixture generation). These can legitimately DELETE things
     (a category, a group, a match set), and a merge would wrongly resurrect
     whatever was deleted by pulling it back in from the stale remote copy.
     These actions are low-frequency / effectively single-operator, so the
     concurrency risk here is much lower than live score entry. */
  appState.updatedAt = Date.now();
  render();
  const fresh = await ensureFreshToken();
  try{
    const url = `${FIREBASE_DB_URL}/${STATE_PATH}.json` + (fresh && auth.idToken ? `?auth=${auth.idToken}` : '');
    const res = await fetchWithTimeout(url, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(appState)
    }, 8000);
    if(!res.ok){
      alert('บันทึกไม่สำเร็จ — อาจยังไม่ได้เข้าสู่ระบบทีมงาน หรือสิทธิ์หมดอายุ กรุณาเข้าสู่ระบบใหม่');
      const remote = await loadState();
      if(remote){ appState = remote; render(); }
    }
  }catch(e){ console.error('save failed', e); }
}
async function saveStateMerged(){
  /* Match-level merge — used ONLY for score entry, where many staff on
     different courts genuinely save at the same time. Never deletes matches,
     only updates fields on existing ones, so the union-merge in mergeMatches
     is always safe here. */
  appState.updatedAt = Date.now();
  render();
  const fresh = await ensureFreshToken();
  try{
    const remote = await loadState();
    const toWrite = remote ? mergeStates(remote, appState) : appState;
    toWrite.updatedAt = Date.now();
    const url = `${FIREBASE_DB_URL}/${STATE_PATH}.json` + (fresh && auth.idToken ? `?auth=${auth.idToken}` : '');
    const res = await fetchWithTimeout(url, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(toWrite)
    }, 8000);
    if(res.ok){
      appState = toWrite;
      render();
    } else {
      alert('บันทึกไม่สำเร็จ — อาจยังไม่ได้เข้าสู่ระบบทีมงาน หรือสิทธิ์หมดอายุ กรุณาเข้าสู่ระบบใหม่');
      const remote2 = await loadState();
      if(remote2){ appState = remote2; render(); }
    }
  }catch(e){ console.error('save failed', e); }
}
function isUserEditing(){
  /* The 4s background refresh re-renders the whole page, which would wipe
     whatever a staff member is currently typing (team names, scores) or
     reset an open dropdown. Skip the refresh while a field is focused —
     the next poll picks the change up a few seconds later. */
  const el = document.activeElement;
  if(!el) return false;
  const tag = el.tagName;
  return tag==='INPUT' || tag==='SELECT' || tag==='TEXTAREA';
}
async function pollRemote(){
  if(isUserEditing()) return;
  try{
    const res = await fetchWithTimeout(`${FIREBASE_DB_URL}/${STATE_PATH}.json`, {}, 8000);
    if(!res.ok) return;
    const remote = await res.json();
    if(isUserEditing()) return; // they may have started typing while we waited on the network
    if(remote && remote.updatedAt !== appState.updatedAt){
      appState = normalizeState(remote);
      render();
    }
  }catch(e){ /* ignore transient network errors */ }
}

/* ---------- pure helpers (take cat explicitly) ---------- */
function getTeamName(cat, tid){ return (cat && cat.teamNames[tid]) || tid || '-'; }
function findGroup(cat, gid){ return cat.groups.find(g=>g.id===gid); }
function findMatch(cat, mid){ return cat.matches.find(m=>m.id===mid); }

function roundRobin(teamIds){
  let arr = teamIds.slice();
  if(arr.length % 2 !== 0) arr.push(null);
  const n = arr.length;
  const rounds = [];
  let work = arr.slice();
  for(let r=0;r<n-1;r++){
    const pairs = [];
    for(let i=0;i<n/2;i++){
      const t1 = work[i], t2 = work[n-1-i];
      if(t1!==null && t2!==null) pairs.push([t1,t2]);
    }
    rounds.push(pairs);
    const fixed = work[0];
    const rest = work.slice(1);
    rest.unshift(rest.pop());
    work = [fixed, ...rest];
  }
  return rounds;
}

function groupMatchResult(match){
  let sets1=0, sets2=0, pts1=0, pts2=0;
  match.sets.forEach(s=>{
    if(s.a==null || s.b==null) return;
    pts1 += Number(s.a); pts2 += Number(s.b);
    if(Number(s.a) > Number(s.b)) sets1++;
    else if(Number(s.b) > Number(s.a)) sets2++;
  });
  return {sets1,sets2,pts1,pts2};
}

function computeStandings(cat, groupId){
  const group = findGroup(cat, groupId);
  const table = {};
  group.teamIds.forEach(tid=>{ table[tid] = {teamId:tid, played:0, win:0, loss:0, pts:0, pf:0, pa:0, diff:0}; });
  cat.matches.filter(m=>m.stage==='group' && m.groupId===groupId && m.status==='done').forEach(m=>{
    const r = groupMatchResult(m);
    table[m.team1Id].played++; table[m.team2Id].played++;
    table[m.team1Id].pf += r.pts1; table[m.team1Id].pa += r.pts2;
    table[m.team2Id].pf += r.pts2; table[m.team2Id].pa += r.pts1;
    // points come directly from sets won: win 1 set = 1 point, win 2 sets = 2 points, etc.
    // "ชนะ"/"แพ้" are counted the same way — by sets, not by match outcome.
    table[m.team1Id].pts += r.sets1;
    table[m.team2Id].pts += r.sets2;
    table[m.team1Id].win += r.sets1;
    table[m.team1Id].loss += r.sets2;
    table[m.team2Id].win += r.sets2;
    table[m.team2Id].loss += r.sets1;
  });
  const arr = Object.values(table);
  arr.forEach(t=> t.diff = t.pf - t.pa);
  arr.sort((a,b)=> b.pts-a.pts || b.diff-a.diff || b.pf-a.pf || getTeamName(cat,a.teamId).localeCompare(getTeamName(cat,b.teamId),'th'));
  return arr;
}

function groupMatches(cat, groupId){
  return cat.matches.filter(m=>m.stage==='group' && m.groupId===groupId).sort((a,b)=> a.round-b.round || a.id.localeCompare(b.id));
}

function allGroupsComplete(cat){
  if(cat.groups.length===0) return false;
  return cat.groups.every(g=>{
    const ms = groupMatches(cat, g.id);

  });
}

function seedOrder(n){
  if(n===1) return [1];
  const prev = seedOrder(n/2);
  const res = [];
  prev.forEach(s=>{ res.push(s); res.push(n+1-s); });
  return res;
}
function roundLabel(t){
  if(t===2) return 'F';
  if(t===4) return 'SF';
  if(t===8) return 'QF';

function roundNamesFor(k){
  const names = []; let t = k;
  while(t>=2){ names.push(roundLabel(t)); t/=2; }
  return names;
}
function roundThai(name){

function formatScheduleDT(str){

/* ---------- knockout: manual bracket setup ---------- */
function suggestedQualifiers(cat){
  /* Every rank tier (1st place of each group, then 2nd place of each group, etc.)
     is kept in natural group order. Combined with the standard bracket seed
     order, this guarantees round 1 always pairs teams from DIFFERENT groups,
     and a group's rank-1 team always meets another group's LAST qualifying
     rank (e.g. with top-2 advancing: 1st place meets a 2nd place from another
     group; never its own group's 2nd place). */
  const advance = cat.config.advancePerGroup;
  const groups = cat.groups;
  const standingsByGroup = {};
  groups.forEach(g=> standingsByGroup[g.id] = computeStandings(cat, g.id));
  let list = [];
  for(let rank=0; rank<advance; rank++){
    let rankTeams = groups.map(g=> standingsByGroup[g.id][rank] ? standingsByGroup[g.id][rank].teamId : null).filter(Boolean);
    list.push(...rankTeams);
  }
  return list;
}
function defaultBracketSize(cat){
  const n = suggestedQualifiers(cat).length || (cat.groups.length * cat.config.advancePerGroup) || 4;
  let size = 2; while(size < n) size *= 2; if(size < 2) size = 2;
  return size;
}
function currentBracketDraft(cat){
  if(cat.bracketSetup) return cat.bracketSetup;
  const size = defaultBracketSize(cat);
  const qualifiers = suggestedQualifiers(cat);
  const slots = new Array(size).fill(null);
  const ord = seedOrder(size);
  ord.forEach((seed,i)=>{ slots[i] = qualifiers[seed-1] || null; });
  return {size, slots};
}
function ensureDraft(cat){
  if(!cat.bracketSetup) cat.bracketSetup = currentBracketDraft(cat);
  return cat.bracketSetup;
}
function validTeamIdsSet(cat){ return new Set(cat.groups.flatMap(g=>g.teamIds)); }
function allTeamsWithHint(cat){

  });

}
function setBracketSize(newSize){

  for(let i=0;i<Math.min(newSize, draft.slots.length); i++) slots[i] = draft.slots[i];
  cat.bracketSetup = {size:newSize, slots};
  saveStateDirect();
}

function autoFillBracket(){

}

function propagateWinner(cat, match){
  if(!match.nextMatchId) return;
  const next = findMatch(cat, match.nextMatchId);
  if(!next) return;
  if(match.nextSlotSide==='team1') next.team1Id = match.winnerId; else next.team2Id = match.winnerId;
  next.updatedAt = Date.now();
}
function resolveByesInPlace(cat){
  const firstRoundName = cat.bracket.roundNames[0];
  let changed = true;
  while(changed){
    changed = false;
    cat.matches.filter(m=>m.stage==='knockout' && m.round===firstRoundName && m.status==='pending').forEach(m=>{
      const hasT1 = !!m.team1Id, hasT2 = !!m.team2Id;
      if(hasT1 !== hasT2){
        m.status='done'; m.winnerId = hasT1 ? m.team1Id : m.team2Id; m.doneAt = Date.now(); m.updatedAt = Date.now(); m.sets = [];
        propagateWinner(cat, m);
        changed = true;
      }
    });
  }
}
function confirmBracketSetup(){
  const cat = activeCat(); if(!cat) return;
  const draft = ensureDraft(cat);
  const {size, slots} = draft;
  const chosen = slots.filter(Boolean);
  if(new Set(chosen).size !== chosen.length){ alert('มีทีมซ้ำกันในสาย กรุณาตรวจสอบก่อนยืนยัน'); return; }
  if(chosen.length === 0){ alert('กรุณาเลือกทีมอย่างน้อย 1 ทีมก่อนยืนยัน'); return; }
  const hasExisting = cat.matches.some(m=>m.stage==='knockout' && m.status!=='pending');
  if(hasExisting){
    if(!confirm('มีผลการแข่งขันรอบตัดเชือกที่บันทึกไว้แล้ว การจับสายใหม่จะลบผลทั้งหมด ยืนยันหรือไม่?')) return;
  }
  const roundNames = roundNamesFor(size);
  let matches = [];
  let count = size;
  roundNames.forEach((roundName, ri)=>{
    const numMatches = count/2;
    for(let s=0;s<numMatches;s++){
      matches.push({
        id:`KO-${roundName}-${s+1}`, stage:'knockout', round:roundName, slot:s+1,
        team1Id: ri===0 ? slots[s*2] : null,
        team2Id: ri===0 ? slots[s*2+1] : null,
        sets:[], status:'pending', winnerId:null, doneAt:null, updatedAt:Date.now(),
        nextMatchId:null, nextSlotSide:null, scheduledAt:null, court:null
      });
    }
    count = numMatches;
  });
  for(let ri=0; ri<roundNames.length-1; ri++){
    const roundName = roundNames[ri];
    const nextRoundName = roundNames[ri+1];
    const roundMatches = matches.filter(m=>m.round===roundName);
    roundMatches.forEach((m, idx)=>{
      const nextSlot = Math.floor(idx/2) + 1;
      m.nextMatchId = `KO-${nextRoundName}-${nextSlot}`;
      m.nextSlotSide = idx % 2 === 0 ? 'team1' : 'team2';
    });
  }
  cat.matches = cat.matches.filter(m=>m.stage==='group').concat(matches);
  cat.bracket = {size, roundNames, generated:true};
  resolveByesInPlace(cat);
  saveStateDirect();
}
function editBracket(){
  const cat = activeCat(); if(!cat) return;
  const hasResults = cat.matches.some(m=>m.stage==='knockout' && m.status==='done' && m.sets && m.sets.length);
  if(hasResults){
    if(!confirm('มีผลการแข่งขันรอบตัดเชือกที่บันทึกไว้แล้ว การแก้ไขสายจะลบผลทั้งหมด ยืนยันหรือไม่?')) return;
  }
  const size = cat.bracket.size;
  const firstRound = cat.bracket.roundNames[0];
  const firstMatches = cat.matches.filter(m=>m.stage==='knockout' && m.round===firstRound).sort((a,b)=>a.slot-b.slot);
  const slots = [];
  firstMatches.forEach(m=>{ slots.push(m.team1Id); slots.push(m.team2Id); });
  cat.bracket = null;
  cat.bracketSetup = {size, slots};
  cat.matches = cat.matches.filter(m=>m.stage!=='knockout');
  saveStateDirect();
}

/* ---------- score submission ---------- */
function submitGroupScore(matchId, setsVals){
  const cat = activeCat(); if(!cat) return;
  const match = findMatch(cat, matchId);
  if(setsVals.some(s=> s.a===null || s.b===null || isNaN(s.a) || isNaN(s.b))){
    alert('กรุณากรอกคะแนนให้ครบทุกเซต');
    return;
  }
  match.sets = setsVals;
  const r = groupMatchResult(match);
  // points come directly from sets won (see computeStandings), so a split
  // result like 1-1 is a normal completed match, not an unresolved tie —
  // winnerId here is purely informational (who took more sets), and can be
  // null if the sets were split evenly.
  let winner = null;
  if(r.sets1 > r.sets2) winner = match.team1Id;
  else if(r.sets2 > r.sets1) winner = match.team2Id;
  match.winnerId = winner;
  match.status = 'done';
  match.doneAt = Date.now();
  match.updatedAt = Date.now();
  ui.scoreEntryMatchId = null;
  saveStateMerged();
}
function submitKnockoutScore(matchId, setsVals){
  const cat = activeCat(); if(!cat) return;
  const match = findMatch(cat, matchId);
  const sets = setsVals.filter(s=> s.a!==null && s.b!==null && !isNaN(s.a) && !isNaN(s.b));
  if(sets.length < 2){ alert('กรุณากรอกผลอย่างน้อย 2 เซต'); return; }
  let w1=0,w2=0;
  sets.forEach(s=>{ if(Number(s.a)>Number(s.b)) w1++; else if(Number(s.b)>Number(s.a)) w2++; });
  match.sets = sets;
  match.updatedAt = Date.now();
  if(w1>=2 || w2>=2){
    match.status = 'done';
    match.winnerId = w1>=2 ? match.team1Id : match.team2Id;
    match.doneAt = Date.now();
    propagateWinner(cat, match);
  } else {
    alert('ผลเซตที่กรอกยังไม่สามารถสรุปผู้ชนะได้ (ต้องชนะ 2 เซตจาก 3) กรุณาตรวจสอบคะแนน');
    match.status = 'ongoing';
    match.winnerId = null;
  }
  ui.scoreEntryMatchId = null;
  saveStateMerged();
}
function clearGroupScore(matchId){
  const cat = activeCat(); if(!cat) return;
  const match = findMatch(cat, matchId);
  if(!match || match.status!=='done') return;
  if(!confirm('ยืนยันยกเลิกผลการแข่งขันคู่นี้? คู่นี้จะกลับไปเป็น "รอแข่ง"')) return;
  match.sets = Array.from({length: cat.config.groupSets}, ()=>({a:null,b:null}));
  match.winnerId = null;
  match.status = 'pending';
  match.doneAt = null;
  match.updatedAt = Date.now();
  ui.scoreEntryMatchId = null;
  saveStateMerged();
}
function clearKnockoutScore(matchId){
  const cat = activeCat(); if(!cat) return;
  const match = findMatch(cat, matchId);
  if(!match || match.status!=='done') return;
  const isBye = !match.sets || match.sets.length===0;
  if(isBye){ alert('คู่นี้ได้บายเข้ารอบ ไม่มีผลคะแนนให้ยกเลิก — ถ้าต้องการเปลี่ยน ให้แก้ไขสายที่แท็บ "รอบตัดเชือก" แทน'); return; }
  const msg = match.nextMatchId
    ? 'ยืนยันยกเลิกผลการแข่งขันคู่นี้? ถ้าทีมที่ชนะไปแข่งในรอบถัดไปแล้ว ผลตรงนั้นจะไม่ถูกต้องด้วย กรุณาตรวจสอบ/แก้ไขรอบถัดไปเองหลังยกเลิก'
    : 'ยืนยันยกเลิกผลการแข่งขันคู่นี้?';
  if(!confirm(msg)) return;
  const oldWinnerId = match.winnerId;
  match.sets = [];
  match.winnerId = null;
  match.status = 'pending';
  match.doneAt = null;
  match.updatedAt = Date.now();
  if(match.nextMatchId){
    const next = findMatch(cat, match.nextMatchId);
    if(next){
      let touched = false;
      if(match.nextSlotSide==='team1' && next.team1Id===oldWinnerId){ next.team1Id = null; touched = true; }
      if(match.nextSlotSide==='team2' && next.team2Id===oldWinnerId){ next.team2Id = null; touched = true; }
      // must bump updatedAt, or the match-level merge would prefer the
      // server's stale copy and silently put the removed team back.
      if(touched) next.updatedAt = Date.now();
    }
  }
  ui.scoreEntryMatchId = null;
  saveStateMerged();
}

    <h2>จัดสายรอบตัดเชือก — ${esc(cat.name)}</h2>

    <div class="row">
      <div>
        <label>ขนาดสาย (จำนวนช่องเริ่มต้น)</label>
        <select onchange="setBracketSize(parseInt(this.value))">
          ${[4,8,16,32].map(sz=>`<option value="${sz}" ${draft.size===sz?'selected':''}>${sz} ช่อง (เริ่มที่${roundThai(roundNamesFor(sz)[0])})</option>`).join('')}
        </select>
      </div>
    </div>
    <div style="margin:10px 0;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn ghost" onclick="autoFillBracket()">เติมอัตโนมัติจากอันดับกลุ่ม</button>
      <button class="btn ghost" onclick="clearBracketSlots()">ล้างทั้งหมด</button>
    </div>
    <h3>${roundThai(roundNamesFor(draft.size)[0])} — ${draft.size} ช่อง</h3>
    ${renderSlotPairs(cat, draft, teamsHint, validIds)}
    <button class="btn primary" onclick="confirmBracketSetup()" style="margin-top:12px;">ยืนยันจับสายรอบตัดเชือก</button>
  </div>`;
}

function renderSlotPairs(cat, draft, teamsHint, validIds){
  let html = '';
  for(let i=0;i<draft.size;i+=2){
    html += `<div class="row" style="align-items:center;margin-bottom:6px;">
      <div>${renderSlotSelect(cat, draft, i, teamsHint, validIds)}</div>
      <div style="flex:0 0 auto;text-align:center;color:var(--ink-soft);font-weight:600;min-width:24px;">vs</div>
      <div>${renderSlotSelect(cat, draft, i+1, teamsHint, validIds)}</div>
    </div>`;
  }
  return html;
}

function renderSlotSelect(cat, draft, idx, teamsHint, validIds){
  const current = (draft.slots[idx] && validIds.has(draft.slots[idx])) ? draft.slots[idx] : null;
  const usedElsewhere = new Set(draft.slots.filter((t,i)=> t && i!==idx));
  return `<select onchange="setSlotTeam(${idx}, this.value)">
    <option value="">ว่าง (bye)</option>
    ${teamsHint.map(t=>`<option value="${t.teamId}" ${current===t.teamId?'selected':''} ${usedElsewhere.has(t.teamId)&&current!==t.teamId?'disabled':''}>${esc(getTeamName(cat,t.teamId))} — ${t.hint}</option>`).join('')}
  </select>`;
}

function renderBracketMatch(cat, m){
  const t1 = m.team1Id ? getTeamName(cat, m.team1Id) : 'รอผู้เข้ารอบ';
  const t2 = m.team2Id ? getTeamName(cat, m.team2Id) : 'รอผู้เข้ารอบ';
  const isBye = m.status==='done' && (!m.sets || m.sets.length===0);
  const scoreStr = isBye ? 'ได้บายเข้ารอบ' : (m.sets||[]).map(s=>`${s.a}-${s.b}`).join(', ');
  const loggedIn = isLoggedIn();
  const canEnter = m.team1Id && m.team2Id && !isBye && loggedIn;
  const canCancel = loggedIn && m.status==='done' && !isBye;
  return `
  <div class="bracket-match">
    <span class="side ${m.winnerId===m.team1Id?'winner':''}">${esc(t1)}</span>
    <span class="score">${esc(scoreStr)}</span>
    <span class="side ${m.winnerId===m.team2Id?'winner':''}">${esc(t2)}</span>
    ${isBye ? `<span></span>` : statusBadge(m)}
    ${renderScheduleControls(m, loggedIn)}
    <span class="bracket-actions">
      ${canEnter ? `<button class="enter-link" onclick="goScoreEntry('${m.id}')">${m.status==='done'?'แก้ไข':'กรอกคะแนน'}</button>` : ''}
      ${canCancel ? `<button class="cancel-link" onclick="clearKnockoutScore('${m.id}')">ยกเลิกผล</button>` : ''}
    </span>
  </div>`;
}

function truncateLabel(s){ if(!s) return ''; return s.length>16 ? s.slice(0,15)+'…' : s; }

function renderBracketSVG(cat, theme){
  if(!cat.bracket || !cat.bracket.generated) return '';
  const roundNames = cat.bracket.roundNames;
  const size = cat.bracket.size;
  const numRounds = roundNames.length;
  const boxW = 150, boxH = 34, gapX = 46, gapY0 = 14;
  const totalCols = numRounds + 1;

  let yCenters = [];
  yCenters[0] = [];
  for(let i=0;i<size;i++) yCenters[0].push(i*(boxH+gapY0) + boxH/2);
  for(let c=1;c<=numRounds;c++){
    const prev = yCenters[c-1];
    const cur = [];
    for(let i=0;i<prev.length/2;i++) cur.push((prev[2*i] + prev[2*i+1])/2);
    yCenters[c] = cur;
  }
  const totalHeight = yCenters[0][yCenters[0].length-1] + boxH/2 + 10;
  const totalWidth = totalCols*boxW + (totalCols-1)*gapX + 20;
  const xFor = (c)=> 10 + c*(boxW+gapX);

  function slotData(c, i){
    if(c < numRounds){
      const roundName = roundNames[c];
      const matchIdx = Math.floor(i/2);
      const match = cat.matches.find(m=>m.stage==='knockout' && m.round===roundName && m.slot===matchIdx+1);
      if(!match) return {label:'-', isWinner:false, empty:true};
      const teamId = (i%2===0) ? match.team1Id : match.team2Id;
      const label = teamId ? getTeamName(cat, teamId) : 'รอผู้เข้ารอบ';
      return {label, isWinner: match.status==='done' && match.winnerId===teamId, empty: !teamId};
    }
    const finalMatch = cat.matches.find(m=>m.stage==='knockout' && m.round===roundNames[numRounds-1]);
    const decided = finalMatch && finalMatch.status==='done' && finalMatch.winnerId;
    return {label: decided ? getTeamName(cat, finalMatch.winnerId) : 'รอผล', isWinner:true, empty:!decided};
  }
  function pairScoreLabel(c, pairIdx){
    const roundName = roundNames[c];
    const match = cat.matches.find(m=>m.stage==='knockout' && m.round===roundName && m.slot===pairIdx+1);
    if(!match) return '';
    if(match.status==='done' && (!match.sets || match.sets.length===0)) return 'บาย';
    if(!match.sets || !match.sets.length) return '';
    let w1=0,w2=0;
    match.sets.forEach(s=>{ if(s.a>s.b) w1++; else if(s.b>s.a) w2++; });
    return `${w1}-${w2}`;
  }

  const lineColor = theme==='light' ? 'var(--sea-teal)' : 'var(--gold)';
  const boxFill = theme==='light' ? 'var(--shuttle-white)' : '#FDFBF6';
  const boxStroke = theme==='light' ? 'var(--line)' : 'var(--line)';
  const textNormal = theme==='light' ? 'var(--ink)' : '#152521';
  const textWinner = theme==='light' ? 'var(--court-green)' : 'var(--court-green)';
  const textEmpty = theme==='light' ? '#9AA39D' : '#9AA39D';
  const championFill = 'var(--gold)';
  const championText = '#4A2E00';

  let svg = `<svg viewBox="0 0 ${totalWidth} ${totalHeight}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;font-family:'Kanit',sans-serif;display:block;">`;
  for(let c=0;c<numRounds;c++){
    const cur = yCenters[c];
    const next = yCenters[c+1];
    const xRight = xFor(c) + boxW;
    const midX = xRight + gapX/2;
    for(let i=0;i<cur.length;i+=2){
      const y0 = cur[i], y1 = cur[i+1];
      const yMid = next[i/2];
      svg += `<line x1="${xRight}" y1="${y0}" x2="${midX}" y2="${y0}" stroke="${lineColor}" stroke-width="2"/>`;
      svg += `<line x1="${xRight}" y1="${y1}" x2="${midX}" y2="${y1}" stroke="${lineColor}" stroke-width="2"/>`;
      svg += `<line x1="${midX}" y1="${y0}" x2="${midX}" y2="${y1}" stroke="${lineColor}" stroke-width="2"/>`;
      svg += `<line x1="${midX}" y1="${yMid}" x2="${xFor(c+1)}" y2="${yMid}" stroke="${lineColor}" stroke-width="2"/>`;
      const scoreLbl = pairScoreLabel(c, i/2);
      if(scoreLbl){
        svg += `<text x="${midX}" y="${yMid-6}" text-anchor="middle" font-size="11" fill="${lineColor}" font-weight="700">${esc(scoreLbl)}</text>`;
      }
    }
  }
  for(let c=0;c<=numRounds;c++){
    const centers = yCenters[c];
    const x = xFor(c);
    centers.forEach((yc,i)=>{
      const d = slotData(c,i);
      const y = yc - boxH/2;
      const isChampion = c===numRounds;
      const fill = isChampion ? championFill : boxFill;
      const textFill = isChampion ? championText : (d.isWinner ? textWinner : (d.empty ? textEmpty : textNormal));
      const fontWeight = (d.isWinner || isChampion) ? '700' : '500';
      svg += `<rect x="${x}" y="${y}" width="${boxW}" height="${boxH}" rx="6" fill="${fill}" stroke="${isChampion?'var(--court-green-dark)':boxStroke}" stroke-width="1"/>`;
      svg += `<text x="${x+boxW/2}" y="${yc+4}" text-anchor="middle" font-size="13" fill="${textFill}" font-weight="${fontWeight}">${esc(truncateLabel(d.label))}</text>`;
    });
  }
  svg += `</svg>`;
  return svg;
}

/* ---------- Schedule tab ---------- */
function renderScheduleTab(){
  const cat = activeCat();
  if(!cat) return noCategoryNotice();
  const loggedIn = isLoggedIn();
  const allMatches = cat.matches.slice();
  if(allMatches.length===0){
    return `<div class="card"><div class="empty">ยังไม่มีคู่แข่งขัน สร้างตารางแข่งก่อนที่แท็บ "ตั้งค่า"</div></div>`;
  }
  const scheduled = allMatches.filter(m=>m.scheduledAt).sort((a,b)=> new Date(a.scheduledAt) - new Date(b.scheduledAt));
  const unscheduled = allMatches.filter(m=>!m.scheduledAt);
  return `
  <div class="card">
    <h2>กำหนดการแข่งขัน — ${esc(cat.name)}</h2>
    ${loggedIn ? `<p class="note">ระบุวันเวลาและคอร์ตให้แต่ละคู่ได้ที่นี่ คู่ที่กำหนดเวลาแล้วจะเรียงตามเวลาให้อัตโนมัติ ส่วนคู่ที่ยังไม่กำหนดจะอยู่ในรายการด้านล่าง</p>` : ''}
    ${scheduled.length===0
      ? `<div class="empty">ยังไม่มีคู่ไหนกำหนดวันเวลา</div>`
      : scheduled.map(m=>renderScheduleRow(cat,m,loggedIn)).join('')}
  </div>
  ${unscheduled.length ? `
  <div class="card">
    <h3 style="margin-top:0;">ยังไม่กำหนดวันเวลา</h3>
    ${unscheduled.map(m=>renderScheduleRow(cat,m,loggedIn)).join('')}
  </div>` : ''}
  `;
}

function renderScheduleRow(cat, m, loggedIn){
  const t1 = m.team1Id ? getTeamName(cat,m.team1Id) : 'รอผู้เข้ารอบ';
  const t2 = m.team2Id ? getTeamName(cat,m.team2Id) : 'รอผู้เข้ารอบ';
  return `
  <div class="schedule-row">
    <span class="match-teams">
      <span style="font-size:12px;color:var(--sea-teal);display:block;">${matchLabel(m)}</span>
      ${esc(t1)}<span class="vs">vs</span>${esc(t2)}
    </span>
    ${renderScheduleControls(m, loggedIn)}
    ${statusBadge(m)}
  </div>`;
}

function renderScoreEntryTab(){
  if(!isLoggedIn()) return requireLoginNotice();
  const cat = activeCat();
  if(!cat) return noCategoryNotice();
  const groupMs = cat.matches.filter(m=>m.stage==='group');
  const koMs = cat.matches.filter(m=>m.stage==='knockout' && m.team1Id && m.team2Id);
  if(groupMs.length===0 && koMs.length===0){
    return `<div class="card"><div class="empty">ยังไม่มีคู่แข่งขันให้กรอกคะแนน สร้างตารางแข่งก่อนที่แท็บ "ตั้งค่า"</div></div>`;
  }
  const selected = ui.scoreEntryMatchId ? findMatch(cat, ui.scoreEntryMatchId) : null;

  const groupOptions = cat.groups.map(g=>{
    const ms = groupMatches(cat, g.id);
    if(ms.length===0) return '';
    return `<optgroup label="กลุ่ม ${g.id}">${ms.map(m=>`
      <option value="${m.id}" ${selected&&selected.id===m.id?'selected':''}>
        ${esc(getTeamName(cat,m.team1Id))} vs ${esc(getTeamName(cat,m.team2Id))} ${m.status==='done'?'(จบแล้ว)':''}
      </option>`).join('')}</optgroup>`;
  }).join('');

  const koOptions = koMs.length ? `<optgroup label="รอบตัดเชือก">${koMs.map(m=>`
      <option value="${m.id}" ${selected&&selected.id===m.id?'selected':''}>
        ${roundThai(m.round)}: ${esc(getTeamName(cat,m.team1Id))} vs ${esc(getTeamName(cat,m.team2Id))} ${m.status==='done'?'(จบแล้ว)':''}
      </option>`).join('')}</optgroup>` : '';

  return `
  <div class="card">
    <h2>กรอกคะแนน — ${esc(cat.name)}</h2>
    <label>เลือกคู่แข่งขัน</label>
    <select onchange="ui.scoreEntryMatchId=this.value; render();">
      <option value="">-- เลือกคู่ --</option>
      ${groupOptions}
      ${koOptions}
    </select>
    <div class="helper">รอบแบ่งกลุ่ม: กรอกครบ ${cat.config.groupSets} เซต · รอบตัดเชือก: Best-of-3 (กรอกอย่างน้อย 2 เซต เว้นเซต 3 ว่างไว้ถ้าไม่ได้แข่ง)</div>
  </div>
  ${selected ? renderScoreForm(cat, selected) : ''}
  `;
}

function renderScoreForm(cat, match){
  const isGroup = match.stage==='group';
  const setCount = isGroup ? cat.config.groupSets : 3;
  const existingSets = match.sets && match.sets.length ? match.sets : Array.from({length:setCount},()=>({a:null,b:null}));
  const t1 = getTeamName(cat, match.team1Id), t2 = getTeamName(cat, match.team2Id);
  return `
  <div class="card">
    <h2>${esc(t1)} <span style="color:var(--ink-soft);font-weight:400;">vs</span> ${esc(t2)}</h2>
    ${isGroup ? '' : `<p class="note">${roundThai(match.round)} — Best-of-3</p>`}
    <div class="setbox-list">
      ${Array.from({length:setCount}).map((_,i)=>{
        const s = existingSets[i] || {a:null,b:null};
        return `
        <div class="setbox">
          <div class="setlabel">เซต ${i+1}${isGroup?'':' (ถ้าไม่ได้แข่งเว้นว่าง)'}</div>
          <div class="setinputs">
            <input type="number" min="0" id="set-${i}-a" value="${s.a==null?'':s.a}" placeholder="0">
            <span>-</span>
            <input type="number" min="0" id="set-${i}-b" value="${s.b==null?'':s.b}" placeholder="0">
          </div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn primary" onclick="handleScoreSubmit('${match.id}', ${setCount}, ${isGroup})">บันทึกผล</button>
    <button class="btn ghost" onclick="ui.scoreEntryMatchId=null; render();">ยกเลิก</button>
  </div>`;
}

function handleScoreSubmit(matchId, setCount, isGroup){
  const setsVals = [];
  for(let i=0;i<setCount;i++){
    const aEl = document.getElementById(`set-${i}-a`);
    const bEl = document.getElementById(`set-${i}-b`);
    const aRaw = aEl.value.trim(), bRaw = bEl.value.trim();
    if(aRaw==='' && bRaw===''){ setsVals.push({a:null,b:null}); continue; }
    setsVals.push({a: aRaw===''?NaN:parseInt(aRaw), b: bRaw===''?NaN:parseInt(bRaw)});
  }
  if(isGroup) submitGroupScore(matchId, setsVals);
  else submitKnockoutScore(matchId, setsVals);
}

/* ---------- Big screen (cycles through categories, filterable) ---------- */
function setBigScreenFilter(val){
  ui.bigScreenFilter = val;
  ui.bigScreenIndex = 0;
  render();
}
function getBigScreenPages(){
  const cats = ui.bigScreenFilter==='all' ? appState.categories : appState.categories.filter(c=>c.id===ui.bigScreenFilter);
  const pages = [];
  cats.forEach(cat=>{
    if(cat.groups.length) pages.push({type:'groups-all', catId:cat.id});
    pages.push({type:'live', catId:cat.id});
    if(cat.matches.some(m=>m.scheduledAt)) pages.push({type:'schedule', catId:cat.id});
    if(cat.bracket && cat.bracket.generated) pages.push({type:'bracket', catId:cat.id});
  });
  return pages;
}

function bsPrev(){ const pages=getBigScreenPages(); if(!pages.length) return; ui.bigScreenIndex=(ui.bigScreenIndex-1+pages.length)%pages.length; render(); }
function bsNext(){ const pages=getBigScreenPages(); if(!pages.length) return; ui.bigScreenIndex=(ui.bigScreenIndex+1)%pages.length; render(); }
function bsToggle(){ ui.bigScreenPlaying = !ui.bigScreenPlaying; render(); }
function bsTick(){
  if(ui.tab!=='bigscreen' || !ui.bigScreenPlaying) return;
  const pages = getBigScreenPages();
  if(pages.length===0) return;
  ui.bigScreenIndex = (ui.bigScreenIndex+1) % pages.length;
  render();
}

function renderBigScreen(){
  const pages = getBigScreenPages();
  const filterSelect = `<select onchange="setBigScreenFilter(this.value)" style="max-width:200px;">
      <option value="all" ${ui.bigScreenFilter==='all'?'selected':''}>ทุกประเภท</option>
      ${appState.categories.map(c=>`<option value="${c.id}" ${ui.bigScreenFilter===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
    </select>`;
  if(pages.length===0){
    return `<div class="bigscreen">
      <div class="bs-title">${esc(appState.eventName)}</div>
      <div class="empty" style="color:#CFE3DC;">ยังไม่มีข้อมูลการแข่งขันสำหรับตัวกรองนี้</div>
      <div class="bs-controls">${filterSelect}</div>
    </div>`;
  }
  const idx = ui.bigScreenIndex % pages.length;
  const page = pages[idx];
  const cat = appState.categories.find(c=>c.id===page.catId);
  let body = '';
  if(page.type==='groups-all') body = renderBSAllGroups(cat);
  else if(page.type==='live') body = renderBSLive(cat);
  else if(page.type==='schedule') body = renderBSSchedule(cat);
  else if(page.type==='bracket') body = `<div style="overflow-x:auto;">${renderBracketSVG(cat, 'dark')}</div>`;

  return `
  <div class="bigscreen">
    <div class="bs-title">${esc(appState.eventName)}</div>
    <div class="bs-sub">${cat ? esc(cat.name) : ''} · หน้าทอน เกาะสมุย</div>
    ${body}
    <div class="bs-controls">
      ${filterSelect}
      <button class="icon-btn" style="color:#CFE3DC;border-color:#2A5A48;" onclick="bsPrev()">‹</button>
      <div class="bs-dots">${pages.map((p,i)=>`<span class="${i===idx?'on':''}"></span>`).join('')}</div>
      <button class="icon-btn" style="color:#CFE3DC;border-color:#2A5A48;" onclick="bsNext()">›</button>
      <button class="btn ghost" style="border-color:#2A5A48;color:#CFE3DC;" onclick="bsToggle()">${ui.bigScreenPlaying?'หยุดหมุนอัตโนมัติ':'เล่นอัตโนมัติ'}</button>
    </div>
  </div>`;
}

function renderBSAllGroups(cat){
  if(cat.groups.length===0) return `<div class="empty" style="color:#CFE3DC;">ยังไม่มีกลุ่ม</div>`;
  return `
  <h3 style="font-family:'Kanit',sans-serif;color:var(--shuttle-white);font-size:clamp(17px,2.4vw,22px);margin:0 0 12px;">อันดับทุกกลุ่ม</h3>
  <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(230px,1fr));gap:18px;">
    ${cat.groups.map(g=>{
      const standings = computeStandings(cat, g.id);
      return `
      <div>
        <h3 style="font-family:'Kanit',sans-serif;color:var(--gold);font-size:clamp(15px,1.8vw,19px);margin:0 0 6px;">กลุ่ม ${g.id}</h3>
        <table>
          <tr><th style="text-align:left;">ทีม</th><th>ชนะ</th><th>แต้ม</th><th>ได้-เสีย</th></tr>
          ${standings.map((t,i)=>`
            <tr class="${i===0?'rank1':i===1?'rank2':''}">
              <td style="text-align:left;">${esc(getTeamName(cat,t.teamId))}</td>
              <td>${t.win}</td><td><b>${t.pts}</b></td><td>${t.pf}-${t.pa}</td>
            </tr>`).join('')}
        </table>
      </div>`;
    }).join('')}
  </div>`;
}

function renderBSSchedule(cat){
  const upcoming = cat.matches.filter(m=>m.scheduledAt && m.status!=='done')
    .sort((a,b)=> new Date(a.scheduledAt) - new Date(b.scheduledAt)).slice(0,10);
  return `
  <h3 style="font-family:'Kanit',sans-serif;color:var(--shuttle-white);font-size:clamp(17px,2.4vw,22px);margin:0 0 10px;">กำหนดการแข่งขัน</h3>
  ${upcoming.length===0 ? `<div class="empty" style="color:#CFE3DC;">ยังไม่มีคู่ที่กำหนดเวลาไว้</div>` :
    upcoming.map(m=>`
    <div class="match-row">
      <span class="match-teams">
        <span style="font-size:0.75em;color:var(--gold);display:block;">${formatScheduleDT(m.scheduledAt)}${m.court?' · '+esc(m.court):''} · ${matchLabel(m)}</span>
        ${esc(m.team1Id?getTeamName(cat,m.team1Id):'รอผู้เข้ารอบ')}<span class="vs">vs</span>${esc(m.team2Id?getTeamName(cat,m.team2Id):'รอผู้เข้ารอบ')}
      </span>
      ${statusBadge(m)}
    </div>`).join('')
  }`;
}

function renderBSLive(cat){
  const all = cat.matches;
  const ongoing = all.filter(m=>m.status==='ongoing');
  const pending = all.filter(m=>m.status==='pending' && m.team1Id && m.team2Id).slice(0,8);
  const recent = all.filter(m=>m.status==='done').sort((a,b)=>(b.doneAt||0)-(a.doneAt||0)).slice(0,6);
  return `
  <h3 style="font-family:'Kanit',sans-serif;color:var(--shuttle-white);font-size:clamp(17px,2.4vw,22px);margin:0 0 10px;">กำลังแข่ง / รอแข่ง</h3>
  ${ongoing.concat(pending).length===0 ? `<div class="empty" style="color:#CFE3DC;">ไม่มีคู่ที่รอแข่งขัน</div>` :
    ongoing.concat(pending).map(m=>`
    <div class="match-row">
      <span class="match-teams">${esc(getTeamName(cat,m.team1Id))}<span class="vs">vs</span>${esc(getTeamName(cat,m.team2Id))}</span>
      ${statusBadge(m)}
    </div>`).join('')
  }
  <h3 style="font-family:'Kanit',sans-serif;color:var(--shuttle-white);font-size:clamp(17px,2.4vw,22px);margin:16px 0 10px;">ผลล่าสุด</h3>
  ${recent.length===0 ? `<div class="empty" style="color:#CFE3DC;">ยังไม่มีผลการแข่งขัน</div>` :
    recent.map(m=>`
    <div class="match-row">
      <span class="match-teams">${esc(getTeamName(cat,m.team1Id))}<span class="vs">vs</span>${esc(getTeamName(cat,m.team2Id))}</span>
      <span class="match-score">${(m.sets||[]).map(s=>`${s.a}-${s.b}`).join(', ')}</span>
    </div>`).join('')
  }`;
}

/* ---------- init ---------- */
(async function init(){
  try{
    await restoreSession();
    const loaded = await loadState();
    appState = (loaded && Array.isArray(loaded.categories)) ? loaded : defaultState();
    if(!loaded){
      try{
        await fetchWithTimeout(`${FIREBASE_DB_URL}/${STATE_PATH}.json`, {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(appState)
        }, 8000);
      }catch(e){}
    }
    if(!appState.activeCategoryId && appState.categories.length) appState.activeCategoryId = appState.categories[0].id;
  }catch(e){
    console.error('เริ่มต้นแอปไม่สำเร็จ ใช้ข้อมูลเริ่มต้นแทน (จะไม่ซิงก์จนกว่าจะเชื่อมต่อได้)', e);
  }
  if(!appState) appState = defaultState();
  render();
  setInterval(pollRemote, 4000);
  setInterval(bsTick, 9000);
})();
</script>
</body>
</html>
